<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Kino Valdymas</title>
</h:head>
<h:body>
    <h1>Kino Studijos (JPA)</h1>

    <h:form>
        <h:dataTable value="#{studios.allStudios}" var="s" border="1">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{s.id}
            </h:column>
            <h:column>
                <f:facet name="header">Pavadinimas</f:facet>
                <h:link value="#{s.name}" outcome="movies?studioId=#{s.id}" />
            </h:column>
        </h:dataTable>
    </h:form>

    <hr/>
    <h3>Pridėti naują studiją</h3>
    <h:form>
        Pavadinimas: <h:inputText value="#{studios.studioToCreate.name}" required="true" />
        <h:commandButton value="Sukurti studiją" action="#{studios.createStudio}" />
    </h:form>

    <hr/>
    <h:link value="Eiti į MyBatis studijų valdymą" outcome="mybatis-studios" />
</h:body>
</html>
